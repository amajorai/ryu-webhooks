# GENERATED by tools/mirror-satellites.sh — edit there, not here.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - name: Validate manifests + bundle
        run: |
          set -euo pipefail
          if [ -d ui ]; then
            find ui -name '*.json' -not -path '*/node_modules/*' -print0 |
              while IFS= read -r -d '' f; do
                python3 -m json.tool "$f" > /dev/null || { echo "invalid JSON: $f" >&2; exit 1; }
              done
          fi
          if [ -d dist ]; then
            ls dist | grep -q . || { echo "dist/ present but empty" >&2; exit 1; }
          fi
          if [ -d sidecar ]; then python3 -m compileall -q sidecar; fi
