# GENERATED by tools/mirror-satellites.sh — edit there, not here.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.6)'
        required: true

permissions:
  contents: write

jobs:
  notes:
    name: Release notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The changelog diffs against the previous tag — needs full history.
          fetch-depth: 0
      - name: Publish release with standardized notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          # Notes are built into a file rather than passed as a multi-line
          # --notes string: inside a `run: |` block scalar EVERY line must stay
          # indented, and a quoted string continuing at column 0 silently ends
          # the block and makes the whole workflow file invalid.
          if [ -f scripts/release-notes.mjs ]; then
            node scripts/release-notes.mjs --tag "$TAG" --channel release --repo "$GITHUB_REPOSITORY" > release-notes.md
          else
            {
              printf '## %s\n\n' "$TAG"
              printf '`%s` at %s.\n\n' "webhooks" "$TAG"
              printf 'Binaries for every platform are attached to this release.\n'
              printf 'Ryu as a whole lives at https://github.com/amajorai/ryu.\n'
            } > release-notes.md
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "ryu-webhooks $TAG" --target "$GITHUB_SHA" --notes-file release-notes.md
          fi

  build:
    needs: notes
    name: bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package the prebuilt companion bundle
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          test -d dist || { echo "no dist/ in this satellite" >&2; exit 1; }
          mkdir -p out
          tar -czf "out/ryu-webhooks-ui-${TAG}.tar.gz" -C dist .
          cp dist/* out/ 2>/dev/null || true
          ( cd out
            for f in *; do
              case "$f" in *.sha256) continue ;; esac
              if command -v sha256sum >/dev/null 2>&1; then sha256sum "$f" > "$f.sha256"
              elif command -v shasum >/dev/null 2>&1; then shasum -a 256 "$f" > "$f.sha256"; fi
            done )
          ls -la out
      # gh release upload, NOT softprops: softprops PATCHes the release even
      # when it is only ADDING assets, and that PATCH is refused for the App
      # token ("Resource not accessible by integration") despite Contents:
      # write. The assets endpoint on its own is permitted.
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(out/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no files matched" >&2; exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
