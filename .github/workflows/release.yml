# GENERATED by tools/mirror-satellites.sh — edit there, not here.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.5)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists - nothing to do."
            exit 0
          fi
          # Notes are built into a file rather than passed as a multi-line
          # --notes string: inside a `run: |` block scalar EVERY line must stay
          # indented, and a quoted string continuing at column 0 silently ends
          # the block and makes the whole workflow file invalid.
          {
            printf 'Source mirror of `%s` at %s.\n\n' "webhooks" "$TAG"
            printf 'Binaries for this version are published on the monorepo release:\n'
            printf 'https://github.com/amajorai/ryu/releases/tag/%s\n\n' "$TAG"
            printf 'This repository is a read-only mirror - development happens in\n'
            printf 'https://github.com/amajorai/ryu\n'
          } > release-notes.md
          gh release create "$TAG" --title "ryu-webhooks $TAG" --notes-file release-notes.md
